services:
  postgres:
    image: postgres:16-alpine
    container_name: pelotitas-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pelotitas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pelotitas}
      POSTGRES_DB: ${POSTGRES_DB:-pelotitas}
    ports:
      - '${DB_PORT:-5477}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pelotitas']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pelotitas-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pelotitas}:${POSTGRES_PASSWORD:-pelotitas}@postgres:5432/${POSTGRES_DB:-pelotitas}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      FREE_TOURNAMENTS_PER_OWNER: ${FREE_TOURNAMENTS_PER_OWNER:-5}
      ENABLE_PAYMENTS: ${ENABLE_PAYMENTS:-false}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      BACKEND_PORT: 3099
    ports:
      - '${BACKEND_PORT:-3099}:3099'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Source + schema (hot-reload)
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # Mount package.json + lock so host installs propagate.
      # node_modules stays as named volume (mac arm64 ≠ linux container arch).
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - backend_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pelotitas-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3099}
    ports:
      - '${FRONTEND_PORT:-3098}:3098'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # Mount package.json + lockfile so host installs propagate.
      # node_modules stays in a named volume to avoid OS/arch mismatch
      # between mac (arm64) and the linux container (amd64/arm64).
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - frontend_modules:/app/node_modules

volumes:
  pgdata:
  backend_modules:
  frontend_modules:
